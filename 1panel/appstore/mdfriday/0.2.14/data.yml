        zh-Hant: 啟用 DNSPod（可選）
        tr: DNSPod'u Etkinleştir (İsteğe Bağlı)
      required: false
      type: text
    - default: ""
      envKey: DNSPOD_ID
      labelEn: DNSPod Secret ID (Optional)
      labelZh: DNSPod Secret ID（可选）
      label:
        en: DNSPod Secret ID (Optional)
        es-es: ID de secreto DNSPod (Opcional)
        ja: DNSPod シークレット ID（任意）
