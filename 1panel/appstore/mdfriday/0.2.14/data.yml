        zh-Hant: DNSPod Secret ID（可選）
        tr: DNSPod Gizli Kimliği (İsteğe Bağlı)
      required: false
      type: text
    - default: ""
      envKey: DNSPOD_SECRET
      labelEn: DNSPod Secret Key (Optional)
      labelZh: DNSPod Secret Key（可选）
      label:
        en: DNSPod Secret Key (Optional)
        es-es: Clave secreta DNSPod (Opcional)
        ja: DNSPod シークレットキー（任意）
        ms: Kunci Rahsia DNSPod (Pilihan)
        pt-br: Chave Secreta DNSPod (Opcional)
        ru: Секретный ключ DNSPod (необязательно)
        ko: DNSPod 비밀 키 (선택)
