        zh-Hant: 網域（可選）
        tr: Alan Adı (İsteğe Bağlı)
      required: false
      type: text
    - default: 8443
      envKey: PANEL_APP_PORT_HTTPS
      labelEn: HTTPS Port
      labelZh: HTTPS 端口
      label:
        en: HTTPS Port
        es-es: Puerto HTTPS
        ja: HTTPS ポート
        ms: Port HTTPS
        pt-br: Porta HTTPS
        ru: HTTPS Порт
        ko: HTTPS 포트
